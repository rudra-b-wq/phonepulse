<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="description" content="PhonePulse — A modern contact manager" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PhonePulse</title>
  <link rel="manifest" href="#" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-base:     #080d1a;
      --bg-panel:    #0d1326;
      --bg-card:     rgba(255,255,255,0.04);
      --bg-hover:    rgba(255,255,255,0.07);
      --bg-active:   rgba(41,182,246,0.12);
      --border:      rgba(255,255,255,0.08);
      --border-glow: rgba(41,182,246,0.35);
      --accent:      #29b6f6;
      --accent-2:    #7c4dff;
      --green:       #4cde8f;
      --red:         #ff5252;
      --text-1:      #eaf0ff;
      --text-2:      #8899bb;
      --text-3:      #4a5578;
      --ring:        conic-gradient(from 180deg, #29b6f6, #7c4dff, #29b6f6);
      --radius:      14px;
      --font:        'Inter', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-base);
      color: var(--text-1);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── LAYOUT ─────────────────────────────────── */
    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 22px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .app-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-1);
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 14px;
    }

    .app-title .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse-dot 2.4s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px 9px 36px;
      color: var(--text-1);
      font-size: 13.5px;
      font-family: var(--font);
      outline: none;
      transition: border-color .2s;
    }

    #search:focus { border-color: var(--border-glow); }
    #search::placeholder { color: var(--text-3); }

    .contact-count {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 500;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 14px 20px 6px;
    }

    .contact-list {
      overflow-y: auto;
      flex: 1;
      padding: 4px 10px 12px;
    }

    .contact-list::-webkit-scrollbar { width: 4px; }
    .contact-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .group-label {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 8px 4px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
    }

    .contact-item:hover   { background: var(--bg-hover); }
    .contact-item.active  { background: var(--bg-active); }

    .contact-item.active .item-name { color: var(--accent); }

    .item-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
    }

    .item-info { flex: 1; min-width: 0; }

    .item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-phone {
      font-size: 11.5px;
      color: var(--text-2);
      font-family: var(--mono);
      margin-top: 2px;
    }

    .item-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--bg-card);
      color: var(--text-3);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ── DETAIL PANEL ────────────────────────────── */
    .detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      padding: 48px 24px 40px;
      background: var(--bg-base);
    }

    .detail::-webkit-scrollbar { width: 4px; }
    .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      color: var(--text-3);
      text-align: center;
    }

    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    /* Avatar ring */
    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin-bottom: 24px;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--ring);
      animation: spin-ring 6s linear infinite;
      opacity: 0;
      transition: opacity .4s;
    }

    .avatar-ring.visible { opacity: 1; }

    @keyframes spin-ring {
      to { transform: rotate(360deg); }
    }

    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--bg-base);
    }

    .contact-avatar {
      position: relative;
      z-index: 1;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
    }

    .online-badge {
      position: absolute;
      bottom: 6px;
      right: 6px;
      z-index: 2;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--green);
      border: 2.5px solid var(--bg-base);
      box-shadow: 0 0 8px var(--green);
    }

    .contact-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-1);
      margin-bottom: 4px;
      text-align: center;
    }

    .contact-role {
      font-size: 13.5px;
      color: var(--text-2);
      margin-bottom: 24px;
      text-align: center;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 14px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: transform .15s;
      text-decoration: none;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }

    .btn-icon:hover { transform: scale(1.08); }

    .btn-call  .btn-icon { background: var(--green);   box-shadow: 0 4px 20px rgba(76,222,143,.35); }
    .btn-wa    .btn-icon { background: #25D366;         box-shadow: 0 4px 20px rgba(37,211,102,.3); }
    .btn-email .btn-icon { background: var(--accent-2); box-shadow: 0 4px 20px rgba(124,77,255,.3); }
    .btn-sms   .btn-icon { background: var(--accent);   box-shadow: 0 4px 20px rgba(41,182,246,.3); }

    .btn-icon svg { color: #fff; }

    .btn-label {
      font-size: 11.5px;
      color: var(--text-2);
      font-weight: 500;
    }

    /* Info cards */
    .info-grid {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-section-label {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 8px 0 4px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color .2s;
    }

    .info-row:hover { border-color: var(--border-glow); }

    .info-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--bg-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
    }

    .info-content { flex: 1; min-width: 0; }

    .info-key {
      font-size: 10.5px;
      color: var(--text-3);
      font-weight: 500;
      letter-spacing: .3px;
      margin-bottom: 2px;
    }

    .info-val {
      font-size: 14px;
      color: var(--text-1);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .info-val a {
      color: var(--accent);
      text-decoration: none;
    }
    .info-val a:hover { text-decoration: underline; }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 8px;
      color: var(--text-3);
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font);
      transition: all .15s;
      white-space: nowrap;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Tags */
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 20px;
    }

    .tag {
      font-size: 11.5px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    /* ── MOBILE ──────────────────────────────────── */
    @media (max-width: 680px) {
      html, body { overflow: hidden; }

      .app { flex-direction: column; }

      .sidebar {
        width: 100%;
        min-width: unset;
        height: 100vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
        position: absolute;
        inset: 0;
        z-index: 10;
        transition: transform .3s cubic-bezier(.4,0,.2,1);
      }

      .sidebar.hidden { transform: translateX(-100%); }

      .detail {
        position: absolute;
        inset: 0;
        z-index: 5;
        padding: 24px 16px 40px;
      }

      .back-btn {
        display: flex !important;
        align-items: center;
        gap: 7px;
        background: none;
        border: none;
        color: var(--accent);
        font-family: var(--font);
        font-size: 14px;
        cursor: pointer;
        padding: 0;
        margin-bottom: 24px;
        align-self: flex-start;
      }
    }

    .back-btn { display: none; }

    /* Entrance animation */
    .detail-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 520px;
      animation: fadeUp .3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(41,182,246,.15);
      border: 1px solid var(--border-glow);
      backdrop-filter: blur(12px);
      color: var(--accent);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->

    <div class="sidebar-header">

        <span class="dot"></span>

</div>

<div class="toast" id="toast"></div>

const contactList   = document.getElementById('contactList');
const countLabel    = document.getElementById('countLabel');
const detail        = document.getElementById('detail');
const searchInput   = document.getElementById('search');
const emptyState    = document.getElementById('emptyState');
const sidebar       = document.getElementById('sidebar');
const toast         = document.getElementById('toast');

let activeId = null;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
}

function buildList(data) {
  contactList.innerHTML = '';
  countLabel.textContent = `${data.length} contact${data.length !== 1 ? 's' : ''}`;

  const groups = {};
  data.forEach(c => { (groups[c.group] = groups[c.group] || []).push(c); });

  Object.entries(groups).forEach(([g, members]) => {
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.textContent = g;
    contactList.appendChild(lbl);

    members.forEach(c => {
      const el = document.createElement('div');
      el.className = 'contact-item' + (c.id === activeId ? ' active' : '');
      el.dataset.id = c.id;
      el.innerHTML = `
        <img class="item-avatar" src="${c.avatar}" alt="${c.name}" loading="lazy" />
        <div class="item-info">
          <div class="item-name">${c.name}</div>
          <div class="item-phone">${c.phone}</div>
        </div>
        <span class="item-tag">${c.tags[0]}</span>
      `;
      el.addEventListener('click', () => openContact(c));
      contactList.appendChild(el);
    });
  });
}

function openContact(c) {
  activeId = c.id;
  buildList(currentData());

  // Mobile: hide sidebar
  if (window.innerWidth <= 680) sidebar.classList.add('hidden');

  const isMobile = window.innerWidth <= 680;
  detail.innerHTML = `
    ${isMobile ? `<button class="back-btn" onclick="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      All Contacts
    </button>` : ''}

      <div class="avatar-wrap">
        <div class="avatar-ring visible"></div>
        <img class="contact-avatar" src="${c.avatar}" alt="${c.name}" />
        <div class="online-badge"></div>
      </div>
      <div class="contact-name">${c.name}</div>
      <div class="contact-role">${c.role}</div>

      <div class="actions">
        <a class="btn btn-call" href="tel:${c.phone.replace(/\s/g,'')}">
          <div class="btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.08 6.08l1.37-1.37a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.03z"/>
            </svg>
          </div>
          <span class="btn-label">Call</span>
        </a>
        <a class="btn btn-wa" href="https://wa.me/${c.phone.replace(/[^0-9]/g,'')}" target="_blank">
          <div class="btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
              <path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.553 4.122 1.523 5.855L.057 23.273a.75.75 0 0 0 .92.921l5.43-1.464A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.805 9.805 0 0 1-5.007-1.373l-.36-.213-3.724 1.004 1.003-3.727-.234-.371A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/>
            </svg>
          </div>
          <span class="btn-label">WhatsApp</span>
        </a>
        <a class="btn btn-email" href="mailto:${c.email}">
          <div class="btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </div>
          <span class="btn-label">Email</span>
        </a>
        <a class="btn btn-sms" href="sms:${c.phone.replace(/\s/g,'')}">
          <div class="btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <span class="btn-label">Message</span>
        </a>
      </div>

      <div class="info-grid">
        <div class="info-section-label">Contact Info</div>

        <div class="info-row">
          <div class="info-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.08 6.08l1.37-1.37a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.03z"/>
            </svg>
          </div>
          <div class="info-content">
            <div class="info-key">Mobile</div>
            <div class="info-val">${c.phone}</div>
          </div>
          <button class="copy-btn" onclick="copyText('${c.phone}')">Copy</button>
        </div>

        <div class="info-row">
          <div class="info-icon" style="color: var(--accent-2)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </div>
          <div class="info-content">
            <div class="info-key">Email</div>
            <div class="info-val"><a href="mailto:${c.email}">${c.email}</a></div>
          </div>
          <button class="copy-btn" onclick="copyText('${c.email}')">Copy</button>
        </div>

        <div class="info-row">
          <div class="info-icon" style="color: var(--green)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0z"/><circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <div class="info-content">
            <div class="info-key">Address</div>
            <div class="info-val">${c.address}</div>
          </div>
          <button class="copy-btn" onclick="copyText('${c.address}')">Copy</button>
        </div>

        <div class="info-section-label">Personal</div>

        <div class="info-row">
          <div class="info-icon" style="color: #ff9800">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>
            </svg>
          </div>
          <div class="info-content">
            <div class="info-key">Birthday</div>
            <div class="info-val">${c.dob}</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon" style="color: var(--accent)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </div>
          <div class="info-content">
            <div class="info-key">Profession</div>
            <div class="info-val">${c.role}</div>
          </div>
        </div>
      </div>

      <div class="tag-row">
        ${c.tags.map(t => `<span class="tag"># ${t}</span>`).join('')}
      </div>
    </div>
  `;
}

function goBack() {
  sidebar.classList.remove('hidden');
  activeId = null;
  detail.innerHTML = emptyState.outerHTML;
  buildList(currentData());
}

function currentData() {
  const q = searchInput.value.toLowerCase();
  if (!q) return contacts;
  return contacts.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.phone.includes(q) ||
    c.email.toLowerCase().includes(q) ||
    c.role.toLowerCase().includes(q) ||
    c.tags.some(t => t.includes(q))
  );
}

searchInput.addEventListener('input', () => {
  buildList(currentData());
  if (activeId && !currentData().find(c => c.id === activeId)) {
    activeId = null;
    detail.innerHTML = emptyState.outerHTML;
  }
});

// PWA Service Worker
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'phonepulse-v1';
    self.addEventListener('install', e => e.waitUntil(
      caches.open(CACHE).then(c => c.addAll(['/']))
    ));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request))
    ));
  `;
  const blob = new Blob([sw], { type: 'application/javascript' });
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}

buildList(contacts);
</script>
</body>
